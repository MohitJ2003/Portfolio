<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Diet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
            color: #1a1a1a;
        }

        h1 {
            color: #1a252f;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .controls button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .controls button:hover {
            background-color: #1d6fa5;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: medium;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            border: 3px solid greenyellow;
            background: white;

        }

        th,
        td {
            border: 1px solid greenyellow;
            padding: 12px 14px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        td[contenteditable] {
            background-color: #fffbe6;
        }

        .action-button {
            background: #27ae60;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 6px;
        }

        .action-button.delete {
            background: #e74c3c;
        }

        .action-cell {
            white-space: nowrap;
        }

        .id-cell {
            font-family: monospace;
            color: #555;
            background: #f7f9fc;
        }
    </style>
</head>

<body>
    <h1>Daily Diet</h1>
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Food</th>
                <th>Protein per 100g</th>
                <th>Main Protein Types</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Soybean</td>
                <td>36–40 g</td>
                <td>Glycinin, Beta-conglycinin</td>
            </tr>
            <tr>
                <td>Chickpeas / Gram</td>
                <td>19–21 g</td>
                <td>Globulins, Albumins, Legumin</td>
            </tr>
            <tr>
                <td>Oats</td>
                <td>13–17 g</td>
                <td>Avenalin, Avenin</td>
            </tr>
            <tr>
                <td>Peanuts</td>
                <td>25–26 g</td>
                <td>Arachin, Conarachin</td>
            </tr>
            <tr>
                <td>Paneer</td>
                <td>18–21 g</td>
                <td>Casein, Whey Protein</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
